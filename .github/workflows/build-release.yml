name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. v0.2.0)"
        required: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolentino/setup-rust-toolchain@v1
        with:
          targets: ${{ matrix.target }}

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libsecret-1-dev \
            pkg-config

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name || github.event.inputs.version }}
          releaseName: "Open Prompt ${{ github.ref_name || github.event.inputs.version }}"
          releaseBody: "Xem [CHANGELOG.md](https://github.com/minhtuancn/open-prompt-release/blob/main/CHANGELOG.md) để biết các thay đổi."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  publish-to-release-repo:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger publish on release repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.RELEASE_REPO_TOKEN }}
          repository: minhtuancn/open-prompt-release
          event-type: new-release
          client-payload: |
            {
              "version": "${{ github.ref_name || github.event.inputs.version }}",
              "release_notes": "Xem CHANGELOG để biết chi tiết."
            }
