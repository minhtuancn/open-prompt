name: Go Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: go-engine/go.sum

      - name: Run tests
        working-directory: go-engine
        run: go test ./... -v -timeout 60s
        env:
          # Bỏ qua test gọi Anthropic API thực khi không có key
          ANTHROPIC_API_KEY: ''
